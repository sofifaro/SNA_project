global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email-me'
  routes:
    - match:
        severity: critical
      receiver: 'email-me'
      continue: true

receivers:
  - name: 'email-me'
    email_configs:
      - to: 'your.email@gmail.com'
        from: 'your.email@gmail.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'your.email@gmail.com'
        auth_password: 'yourpassword'   
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
