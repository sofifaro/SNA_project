name: Deploy Monitoring Stack

on:
  push:
    branches: [ main ]
    paths:
      - 'prometheus/**'
      - 'alertmanager/**'
      - 'loki/**'
      - 'promtail/**'
      - 'nginx/**'
      - 'docker-compose.yml'

jobs:
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/prometheus:/etc/prometheus \
            prom/prometheus:latest \
            promtool check config /etc/prometheus/prometheus.yml

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/prometheus:/etc/prometheus \
            prom/prometheus:latest \
            promtool check rules /etc/prometheus/alerts.yml

      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/alertmanager:/etc/alertmanager \
            prom/alertmanager:latest \
            amtool check-config /etc/alertmanager/config.yml

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: validate          # if all validations pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            STACK_DIR=/opt/monitoring-stack

            echo "==> Pulling latest changes..."
            cd $STACK_DIR
            git pull origin main

            echo "==> Pulling Docker images..."
            docker compose pull

            echo "==> Restarting stack ..."
            docker compose up -d --remove-orphans

            echo "==> Reloading Prometheus config ..."
            sleep 5
            curl -s -X POST http://localhost:9090/-/reload || echo "Prometheus reload failed (non-fatal)"

            echo "==> Checking running containers..."
            docker compose ps

            echo "==> Deploy complete!"
