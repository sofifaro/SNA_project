server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # all *.log files from /var/log
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: Faro-2.local    # change to your hostname
          __path__: /var/log/*log

