server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # all *.log files from /var/log
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: your-server        # change to your hostname
          __path__: /var/log/*log

  # docker container logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: your-server        # change to your hostname
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag: attrs.tag
          source: attrs
      - regex:
          expression: (?P<container_name>(?:[^|]*[^ |]))
          source: tag
      - output:
          source: output
      - labels:
          stream:
          container_name:
